name: Monitor convocatoria BdE 2026A11

on:
  schedule:
    # Cada 30 minutos. Formato cron en UTC.
    - cron: "*/30 * * * *"
  workflow_dispatch:  # permite lanzarlo a mano desde la pestaña Actions

permissions:
  contents: write  # necesario para commitear state.json

concurrency:
  group: bde-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests

      - name: Run monitor
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor_bde.py

      - name: Commit estado si cambió
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name "bde-monitor-bot"
            git config user.email "actions@github.com"
            git add state.json
            git commit -m "Actualiza estado (fecha/PDFs vistos)"
            git pull --rebase --autostash origin main
            git push
          fi
